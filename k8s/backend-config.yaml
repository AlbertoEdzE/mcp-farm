apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: contextforge-backend-config
  namespace: mcp-farm
  labels:
    app: contextforge
    project: mcp-farm
spec:
  healthCheck:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    type: HTTP
    requestPath: /health
    port: 4444
