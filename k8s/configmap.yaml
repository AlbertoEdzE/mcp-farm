apiVersion: v1
kind: ConfigMap
metadata:
  name: contextforge-config
  namespace: mcp-farm
  labels:
    app: contextforge
    project: mcp-farm
data:
  # ContextForge binds to HOST:PORT. Must be 0.0.0.0 so K8s probes can reach it.
  PORT: "4444"
  HOST: "0.0.0.0"
  # Health endpoint path confirmed from ContextForge source (Q1 resolved 2026-05-25).
  CF_GATEWAY_HEALTH_PATH: "/health"
  CF_REGISTRY_HEALTH_PATH: "/health"
  # Allow ContextForge to connect to internal k8s service IPs for gateway registration.
  # Required for the demo MCP server at mcp-demo-svc.mcp-farm.svc.cluster.local:9000.
  SSRF_ALLOW_PRIVATE_NETWORKS: "true"
  # Enable the Admin UI and Admin API — both default to false in ContextForge.
  MCPGATEWAY_UI_ENABLED: "true"
  MCPGATEWAY_ADMIN_API_ENABLED: "true"
  # Disable secure-only cookie flag so cookies are transmitted through the
  # Cloud Shell Web Preview HTTP proxy. See k-mcp-farm README line 804 and
  # the "Serving over HTTP" warning shown on the login page.
  SECURE_COOKIES: "false"
