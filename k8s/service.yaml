apiVersion: v1
kind: Service
metadata:
  name: contextforge-svc
  namespace: mcp-farm
  labels:
    app: contextforge
    project: mcp-farm
spec:
  type: ClusterIP
  selector:
    app: contextforge
  ports:
    - name: gateway
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: registry
      port: 8081
      targetPort: 8081
      protocol: TCP
