apiVersion: v1
kind: Service
metadata:
  name: contextforge-svc
  namespace: mcp-farm
  labels:
    app: contextforge
    project: mcp-farm
  annotations:
    # Container-native load balancing: GKE routes directly to pod IPs via NEG.
    cloud.google.com/neg: '{"ingress": true}'
    # Tell the GCE L7 LB which BackendConfig to use for health checks.
    cloud.google.com/backend-config: '{"default": "contextforge-backend-config"}'
spec:
  type: ClusterIP
  selector:
    app: contextforge
  ports:
    - name: http
      port: 80
      targetPort: 4444
      protocol: TCP
