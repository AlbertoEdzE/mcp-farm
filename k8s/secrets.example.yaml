# Kubernetes Secrets template — shape only, no real values.
# Create k8s/secrets.yaml from this template, fill in real values,
# then: kubectl apply -f k8s/secrets.yaml -n mcp-farm
# k8s/secrets.yaml is never committed.

apiVersion: v1
kind: Secret
metadata:
  name: contextforge-db-credentials
  namespace: mcp-farm
  labels:
    app: contextforge
    project: mcp-farm
type: Opaque
stringData:
  CLOUDSQL_USER: "<db-username-from-env>"
  CLOUDSQL_PASSWORD: "<db-password-from-env>"
  CLOUDSQL_CONNECTION_STRING: "<host:5432/contextforge-from-env>"
---
apiVersion: v1
kind: Secret
metadata:
  name: contextforge-redis-credentials
  namespace: mcp-farm
  labels:
    app: contextforge
    project: mcp-farm
type: Opaque
stringData:
  REDIS_HOST: "<redis-host-from-env>"
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: ibm-entitlement-key
  namespace: mcp-farm
  labels:
    app: contextforge
    project: mcp-farm
# type is kubernetes.io/dockerconfigjson for image pull secrets.
# See scripts/gke_deploy.sh for the creation command using IBM_ENTITLEMENT_KEY env var.
# Resolve Q1 before populating this secret.
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "<base64-encoded-docker-config-resolve-Q1>"
