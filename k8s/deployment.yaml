apiVersion: apps/v1
kind: Deployment
metadata:
  name: contextforge
  namespace: mcp-farm
  labels:
    app: contextforge
    project: mcp-farm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: contextforge
  template:
    metadata:
      labels:
        app: contextforge
    spec:
      containers:
        - name: contextforge
          # Image is patched at deploy time by gke_deploy.sh using:
          #   kubectl set image deployment/contextforge contextforge="${CF_IMAGE_URI}:${CF_IMAGE_TAG}"
          # Placeholder satisfies kubectl dry-run validation before deployment.
          image: "placeholder/contextforge:placeholder"
          # IfNotPresent avoids repeated pulls of :latest from ghcr.io (rate limit risk).
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4444
              protocol: TCP
          envFrom:
            - configMapRef:
                name: contextforge-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: contextforge-db-credentials
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: contextforge-redis-credentials
                  key: REDIS_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 4444
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 4444
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
