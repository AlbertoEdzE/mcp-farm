# ContextForge configuration template
# Copy to config/contextforge.yaml and populate with real values.
# config/contextforge.yaml is never committed. This file is committed.
# Values shown as "${VAR_NAME}" are read from environment variables at runtime.

gateway:
  port: "${CF_GATEWAY_PORT}"
  # Health endpoint path. Assumed /health — confirm when Q1 is resolved.
  health_path: "${CF_GATEWAY_HEALTH_PATH}"
  # expose_container_port must be true for the gateway to bind and expose its port.
  # This was the root cause of the Cloud Run deployment failure on 2026-05-20.
  # See doc/ADR/ADR-001-gke-over-cloud-run.md for full context.
  expose_container_port: "${CF_EXPOSE_CONTAINER_PORT}"

registry:
  port: "${CF_REGISTRY_PORT}"
  # Health endpoint path. Assumed /health — confirm when Q1 is resolved.
  health_path: "${CF_REGISTRY_HEALTH_PATH}"

database:
  connection_string: "${CLOUDSQL_CONNECTION_STRING}"
  database_name: "${CLOUDSQL_DATABASE_NAME}"
  user: "${CLOUDSQL_USER}"
  password: "${CLOUDSQL_PASSWORD}"

cache:
  host: "${REDIS_HOST}"
  port: "${REDIS_PORT}"

proxy:
  # Static OAuth 2.0 registration assumed per ADR-003.
  # Q4: Confirm with Bala whether the GitLab instance requires dynamic registration.
  - name: gitlab-mcp
    description: GitLab MCP server — code repository and CI/CD tools
    url: "${GITLAB_MCP_URL}"
    transport: sse
    auth:
      type: oauth2
      # Assumed token endpoint path — verify from GitLab instance docs when Q4 is resolved.
      token_endpoint: "${GITLAB_MCP_URL}/oauth/token"
      client_id: "${GITLAB_OAUTH_CLIENT_ID}"
      client_secret: "${GITLAB_OAUTH_CLIENT_SECRET}"
      scopes:
        - read_api
        - read_repository

virtual_servers:
  # Each virtual server is the access control boundary for one AI agent role.
  # Tools reference registered MCP proxies. See doc/ADR/ADR-004.
  # The exact proxy reference key is confirmed when Q1 is resolved.
  - name: "${VIRTUAL_SERVER_NAME}"
    description: Baptist Health AI platform — governed tool access point
    tools:
      - proxy: gitlab-mcp
        name: tool-alpha
        description: Code search and repository query tool
        input_schema:
          type: object
          properties:
            query:
              type: string
              description: Search query string
          required:
            - query
      - proxy: gitlab-mcp
        name: tool-beta
        description: Entity lookup by identifier
        input_schema:
          type: object
          properties:
            entity_id:
              type: string
              format: uuid
              description: UUID of the entity to retrieve
          required:
            - entity_id
