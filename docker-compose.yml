services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${CLOUDSQL_DATABASE_NAME:-contextforge}
      POSTGRES_USER: ${CLOUDSQL_USER}
      POSTGRES_PASSWORD: ${CLOUDSQL_PASSWORD}
    ports:
      - "${LOCAL_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CLOUDSQL_USER} -d ${CLOUDSQL_DATABASE_NAME:-contextforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    ports:
      - "${LOCAL_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  contextforge:
    # Q1 resolved 2026-05-25: public image on ghcr.io, no pull credentials required.
    image: "${CF_IMAGE_URI:-ghcr.io/ibm/mcp-context-forge}:${CF_IMAGE_TAG:-latest}"
    ports:
      - "${LOCAL_CF_GATEWAY_PORT:-4444}:4444"
    environment:
      # ContextForge binds to HOST:PORT. Must be 0.0.0.0 for health checks.
      PORT: "${PORT:-4444}"
      HOST: "${HOST:-0.0.0.0}"
      # SQLAlchemy asyncpg URL — ContextForge uses DATABASE_URL, not CLOUDSQL_* vars.
      DATABASE_URL: "postgresql+psycopg://${CLOUDSQL_USER}:${CLOUDSQL_PASSWORD}@postgres:5432/${CLOUDSQL_DATABASE_NAME:-contextforge}"
      # Redis URI — ContextForge uses REDIS_URL, not REDIS_HOST/REDIS_PORT vars.
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4444/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    driver: local
